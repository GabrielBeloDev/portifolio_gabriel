name: ci

on:
  push:
    branches: [main]
  pull_request:

# Build-time only: next build evaluates route modules, which parse the typed
# env. No connection is ever opened in CI.
env:
  DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
  BETTER_AUTH_SECRET: "ci-only-secret-ci-only-secret-ci-only-secret"

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run lint typecheck test build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web exec playwright install chromium --with-deps
      - run: pnpm turbo run build --filter=web
      - run: pnpm --filter web test:e2e
        env:
          CI: "true"
