name: backup

on:
  schedule:
    - cron: "0 3 * * 0"
  workflow_dispatch:

jobs:
  dump:
    runs-on: ubuntu-latest
    # postgres:17 ships a pg_dump new enough for the Neon server version
    container: postgres:17
    steps:
      - name: Dump database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL secret is not set (Settings > Secrets and variables > Actions)"
            exit 1
          fi
          pg_dump --format=custom --file="backup-$(date +%Y-%m-%d).dump" "$DATABASE_URL"
      - uses: actions/upload-artifact@v4
        with:
          name: db-backup
          path: backup-*.dump
          retention-days: 30
          if-no-files-found: error
